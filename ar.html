<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>QR Marker AR Viewer</title>

  <link rel="stylesheet" href="./styles.css" />

  <script src="./libs/aframe-v1.5.0.min.js"></script>
  <script src="./libs/mindar-image-aframe.prod.js"></script>
  <script src="./gesture.js?v=2"></script>
</head>

<body>
  <div id="status">카메라 권한을 허용한 뒤 앵커 QR을 비추세요.</div>
  <div id="help">한 손가락: 회전 · 두 손가락: 확대/축소 · QR을 평평하게 두고 밝은 곳에서 사용</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets/anchor.mind; maxTrack: 1; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="60000">
      <img id="anchorImage" src="./qr/anchor-target.png" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="anchorTarget" mindar-image-target="targetIndex: 0">

      <a-plane
        src="#anchorImage"
        position="0 0 0"
        width="1"
        height="1"
        rotation="0 0 0"
        material="transparent: true; opacity: 0.08; side: double">
      </a-plane>

      <!-- 앵커 확인용 빨간 박스 -->
      <a-box
        position="-0.5 0 0.1"
        scale="0.08 0.08 0.08"
        color="red">
      </a-box>

      <!-- GLB 테스트 모델: 먼저 test_box.glb로 확인 -->
      <a-entity
        id="arModel"
        gltf-model="url(./assets/models/model.glb?v=20)"
        position="0 0 0.02"
        rotation="0 0 0"
        scale="1 1 1"
        visible="true"
        gesture-control="minScale: 0.001; maxScale: 6">
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.0" position="0 1 1"></a-light>

    </a-entity>
  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const status = document.querySelector('#status');
      const target = document.querySelector('#anchorTarget');
      const scene = document.querySelector('a-scene');
      const model = document.querySelector('#arModel');

      scene.addEventListener('arReady', function () {
        status.textContent = '준비 완료: 앵커 QR을 카메라 중앙에 비추세요.';
      });

      scene.addEventListener('arError', function () {
        status.textContent = '카메라를 시작하지 못했습니다. 브라우저 권한과 HTTPS 주소를 확인하세요.';
      });

      target.addEventListener('targetFound', function () {
        status.textContent = '앵커 QR 인식됨: GLB 모델 표시 시도 중';
      });

      target.addEventListener('targetLost', function () {
        status.textContent = '앵커 QR을 다시 화면 중앙에 비추세요.';
      });

      model.addEventListener('model-loaded', function () {
        status.textContent = 'GLB 모델 로드 완료: QR 위에 모델이 보여야 합니다.';
        console.log('GLB loaded successfully');
      });

      model.addEventListener('model-error', function (event) {
        status.textContent = 'GLB 모델 로드 실패: 파일명, 경로, GLB 변환 상태를 확인하세요.';
        console.error('GLB load error:', event);
      });
    });
  </script>
</body>
</html>
