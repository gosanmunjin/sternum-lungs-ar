<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>학생 배부용 QR</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="print-body">
  <p class="no-print"><button onclick="window.print()">인쇄하기</button> <a href="../index.html">처음으로</a></p>
  <h1>QR 마커 AR 수업용</h1>
  <p>1번 QR로 접속한 뒤, 2번 QR을 모바일 카메라 화면에 비추면 3D 모델이 QR 위에 뜹니다.</p>
  <div class="print-grid">
    <section class="print-card">
      <h2>1. 접속 QR</h2>
      <img src="./access-url.png" alt="AR 페이지 접속 QR" />
      <p>모바일 기본 카메라로 먼저 찍어서 AR 페이지에 접속합니다.</p>
    </section>
    <section class="print-card">
      <h2>2. 앵커 QR</h2>
      <img src="./anchor-target.png" alt="AR 앵커 QR" />
      <p>AR 페이지가 열린 뒤, 이 QR을 카메라 화면 중앙에 비춥니다.</p>
    </section>
  </div>
  <h2>학생 안내</h2>
  <p>카메라 권한을 허용하세요. QR이 흔들리면 모델도 흔들릴 수 있으니 종이를 책상 위에 평평하게 놓고 사용하세요.</p>
  <p>한 손가락으로 모델을 회전하고, 두 손가락으로 확대/축소합니다.</p>
</body>
</html>
